# =====================================================================
# VenTune — één docker-compose voor de hele stack.
#
# BELANGRIJK: poortbindingen staan bewust ZONDER 127.0.0.1-prefix.
# De Cloudflare-tunnel draait in een aparte container en kan de loopback
# van deze host niet bereiken. Dus "8091:80", niet "127.0.0.1:8091:80".
# =====================================================================

services:
  # -------------------------------------------------------------------
  # PostgreSQL 16
  # -------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------
  # Backend (Node + Express + Socket.IO)
  # -------------------------------------------------------------------
  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      APP_URL: ${APP_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      TMDB_API_KEY: ${TMDB_API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    ports:
      - "8090:3000"

  # -------------------------------------------------------------------
  # Frontend (React PWA via nginx, proxyt naar de server)
  # -------------------------------------------------------------------
  client:
    build:
      context: ./client
      args:
        VITE_SPOTIFY_CLIENT_ID: ${VITE_SPOTIFY_CLIENT_ID}
        VITE_SPOTIFY_REDIRECT_URI: ${VITE_SPOTIFY_REDIRECT_URI}
        VITE_APP_URL: ${VITE_APP_URL}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8091:80"

volumes:
  pgdata:
